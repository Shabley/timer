<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 타이머 · 스톱워치</title>
  <style>
    :root {
      --bg: #0f0f23;
      --panel: rgba(255, 255, 255, 0.075);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --accent: #748ffc;
      --accent-2: #9aaafe;
      --text: #f7f8ff;
      --muted: #a8afd6;
      --danger: #ff6b6b;
      --success: #63e6be;
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(116, 143, 252, 0.28), transparent 28%),
        radial-gradient(circle at 90% 10%, rgba(154, 170, 254, 0.16), transparent 30%),
        radial-gradient(circle at 50% 95%, rgba(99, 230, 190, 0.09), transparent 32%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 32px 18px;
      overflow-x: hidden;
    }

    .app {
      width: min(980px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.045));
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,0.13), transparent 24%, transparent 78%, rgba(116,143,252,0.11));
    }

    header {
      position: relative;
      padding: 30px 30px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), #5267ff);
      box-shadow: 0 15px 35px rgba(116, 143, 252, 0.35);
    }

    .logo svg {
      width: 27px;
      height: 27px;
      fill: none;
      stroke: white;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status-pill {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    main {
      position: relative;
      padding: 28px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.18);
      margin-bottom: 26px;
    }

    .tab {
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      color: var(--muted);
      background: transparent;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .tab.active {
      color: white;
      background: linear-gradient(135deg, rgba(116, 143, 252, 0.95), rgba(116, 143, 252, 0.55));
      box-shadow: 0 14px 35px rgba(116, 143, 252, 0.24);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 430px) 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.065);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .display-card {
      padding: 26px;
      display: grid;
      place-items: center;
      min-height: 480px;
    }

    .progress-wrap {
      width: min(330px, 76vw);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    .progress-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      filter: drop-shadow(0 20px 40px rgba(116, 143, 252, 0.22));
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 13;
      stroke-linecap: round;
    }

    .track {
      stroke: rgba(255,255,255,0.11);
    }

    .progress {
      stroke: var(--accent);
      stroke-dasharray: 879.65;
      stroke-dashoffset: 879.65;
      transition: stroke-dashoffset 0.18s linear;
    }

    .center-display {
      position: absolute;
      inset: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.12), transparent 42%),
        rgba(15,15,35,0.72);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: inset 0 0 50px rgba(0,0,0,0.22);
    }

    .mode-label {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.6rem, 9vw, 4.8rem);
      line-height: 1;
      letter-spacing: -0.07em;
      font-weight: 900;
      text-shadow: 0 12px 35px rgba(0,0,0,0.36);
    }

    .subtime {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.94rem;
      font-variant-numeric: tabular-nums;
    }

    .control-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
    }

    button {
      font-family: inherit;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 13px;
      color: var(--text);
      background: rgba(255,255,255,0.075);
      cursor: pointer;
      font-size: 0.98rem;
      font-weight: 800;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.24);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #5267ff);
      border-color: transparent;
      color: white;
      box-shadow: 0 14px 34px rgba(116, 143, 252, 0.25);
    }

    .btn.danger {
      color: #ffd8d8;
      border-color: rgba(255, 107, 107, 0.28);
      background: rgba(255, 107, 107, 0.11);
    }

    .btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .preset {
      padding: 12px 8px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.055);
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .preset:hover,
    .preset.active {
      color: white;
      background: rgba(116, 143, 252, 0.23);
      border-color: rgba(116, 143, 252, 0.55);
    }

    .custom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
    }

    .input-group {
      display: grid;
      gap: 7px;
    }

    label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.18);
      color: white;
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
      font-size: 1rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    input:focus {
      border-color: rgba(116, 143, 252, 0.75);
      box-shadow: 0 0 0 4px rgba(116, 143, 252, 0.13);
    }

    .lap-panel {
      flex: 1;
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }

    .lap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .mini-btn {
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      padding: 8px 11px;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
    }

    .mini-btn:hover {
      color: white;
      background: rgba(255,255,255,0.13);
    }

    .laps {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: 260px;
      padding-right: 4px;
    }

    .lap {
      display: grid;
      grid-template-columns: 54px 1fr 1fr;
      align-items: center;
      gap: 10px;
      padding: 12px 13px;
      border-radius: 15px;
      background: rgba(0,0,0,0.17);
      border: 1px solid rgba(255,255,255,0.08);
      font-variant-numeric: tabular-nums;
    }

    .lap span:first-child {
      color: var(--muted);
      font-weight: 800;
    }

    .lap strong {
      justify-self: end;
      font-size: 0.96rem;
    }

    .lap small {
      color: var(--muted);
      justify-self: end;
    }

    .empty {
      min-height: 120px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 18px;
      padding: 18px;
      line-height: 1.55;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: rgba(22, 22, 45, 0.92);
      border: 1px solid rgba(116, 143, 252, 0.35);
      color: white;
      padding: 13px 16px;
      border-radius: 999px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      transition: 0.25s ease;
      font-weight: 800;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 820px) {
      body {
        padding: 14px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        padding: 24px 20px 16px;
      }

      .status-pill {
        width: 100%;
        text-align: center;
      }

      main {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .display-card {
        min-height: 390px;
        padding: 20px;
      }

      .control-card {
        padding: 18px;
      }

      .preset-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .custom-grid {
        grid-template-columns: 1fr 1fr;
      }

      .custom-grid .btn {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 460px) {
      .tabs {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .preset-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .lap {
        grid-template-columns: 42px 1fr;
      }

      .lap small {
        grid-column: 2;
      }

      .center-display {
        inset: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 8v5l3 2" />
            <path d="M9 2h6" />
            <path d="M12 22a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z" />
          </svg>
        </div>
        <div>
          <h1>타이머 · 스톱워치</h1>
          <div class="subtitle">집중 시간, 강의 실습, 발표 리허설을 위한 프리미엄 시간 도구</div>
        </div>
      </div>
      <div class="status-pill" id="statusPill">대기 중</div>
    </header>

    <main>
      <div class="tabs" role="tablist" aria-label="모드 선택">
        <button class="tab active" id="stopwatchTab" type="button" role="tab" aria-selected="true">스톱워치</button>
        <button class="tab" id="timerTab" type="button" role="tab" aria-selected="false">카운트다운 타이머</button>
      </div>

      <section class="panel active" id="stopwatchPanel">
        <div class="grid">
          <div class="card display-card">
            <div class="progress-wrap">
              <svg class="progress-ring" viewBox="0 0 320 320" aria-hidden="true">
                <circle class="track" cx="160" cy="160" r="140"></circle>
                <circle class="progress" id="stopwatchProgress" cx="160" cy="160" r="140"></circle>
              </svg>
              <div class="center-display">
                <div>
                  <div class="mode-label">STOPWATCH</div>
                  <div class="time" id="stopwatchDisplay">00:00.00</div>
                  <div class="subtime" id="stopwatchSub">랩 기록은 자동 저장됩니다</div>
                </div>
              </div>
            </div>
          </div>

          <div class="card control-card">
            <div>
              <h2 class="section-title">스톱워치 컨트롤</h2>
              <div class="controls">
                <button class="btn primary" id="swStartPause" type="button">시작</button>
                <button class="btn" id="swLap" type="button" disabled>랩 기록</button>
                <button class="btn danger" id="swReset" type="button">초기화</button>
              </div>
            </div>

            <div class="lap-panel">
              <div class="lap-header">
                <h2 class="section-title">랩 기록</h2>
                <button class="mini-btn" id="clearLaps" type="button">전체 삭제</button>
              </div>
              <div class="laps" id="lapList"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" id="timerPanel">
        <div class="grid">
          <div class="card display-card">
            <div class="progress-wrap">
              <svg class="progress-ring" viewBox="0 0 320 320" aria-hidden="true">
                <circle class="track" cx="160" cy="160" r="140"></circle>
                <circle class="progress" id="timerProgress" cx="160" cy="160" r="140"></circle>
              </svg>
              <div class="center-display">
                <div>
                  <div class="mode-label">COUNTDOWN</div>
                  <div class="time" id="timerDisplay">25:00</div>
                  <div class="subtime" id="timerSub">프리셋 또는 커스텀 시간을 선택하세요</div>
                </div>
              </div>
            </div>
          </div>

          <div class="card control-card">
            <div>
              <h2 class="section-title">프리셋 타이머</h2>
              <div class="preset-grid" id="presetGrid">
                <button class="preset" type="button" data-seconds="60">1분</button>
                <button class="preset" type="button" data-seconds="180">3분</button>
                <button class="preset" type="button" data-seconds="300">5분</button>
                <button class="preset" type="button" data-seconds="600">10분</button>
                <button class="preset active" type="button" data-seconds="1500">25분</button>
              </div>
            </div>

            <div>
              <h2 class="section-title">커스텀 설정</h2>
              <div class="custom-grid">
                <div class="input-group">
                  <label for="customMin">분</label>
                  <input id="customMin" type="number" min="0" max="999" value="25" inputmode="numeric" />
                </div>
                <div class="input-group">
                  <label for="customSec">초</label>
                  <input id="customSec" type="number" min="0" max="59" value="0" inputmode="numeric" />
                </div>
                <button class="btn" id="applyCustom" type="button">적용</button>
              </div>
            </div>

            <div>
              <h2 class="section-title">타이머 컨트롤</h2>
              <div class="controls">
                <button class="btn primary" id="timerStartPause" type="button">시작</button>
                <button class="btn" id="timerReset" type="button">초기화</button>
                <button class="btn danger" id="timerStopSound" type="button">알림 중지</button>
              </div>
            </div>

            <div class="empty">
              완료 시 브라우저 알림음이 재생됩니다.<br />
              모바일에서는 첫 시작 버튼을 눌러야 소리가 정상 활성화됩니다.
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">완료되었습니다</div>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 140;

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => document.querySelectorAll(selector);

    const statusPill = $("#statusPill");
    const toast = $("#toast");

    const stopwatchTab = $("#stopwatchTab");
    const timerTab = $("#timerTab");
    const stopwatchPanel = $("#stopwatchPanel");
    const timerPanel = $("#timerPanel");

    const stopwatchDisplay = $("#stopwatchDisplay");
    const stopwatchSub = $("#stopwatchSub");
    const stopwatchProgress = $("#stopwatchProgress");
    const swStartPause = $("#swStartPause");
    const swLap = $("#swLap");
    const swReset = $("#swReset");
    const lapList = $("#lapList");
    const clearLaps = $("#clearLaps");

    const timerDisplay = $("#timerDisplay");
    const timerSub = $("#timerSub");
    const timerProgress = $("#timerProgress");
    const timerStartPause = $("#timerStartPause");
    const timerReset = $("#timerReset");
    const timerStopSound = $("#timerStopSound");
    const applyCustom = $("#applyCustom");
    const customMin = $("#customMin");
    const customSec = $("#customSec");

    let currentMode = "stopwatch";

    let swRunning = false;
    let swStart = 0;
    let swElapsed = 0;
    let swRaf = null;
    let laps = JSON.parse(localStorage.getItem("premiumStopwatchLaps") || "[]");

    let timerRunning = false;
    let timerDuration = 1500 * 1000;
    let timerRemaining = timerDuration;
    let timerEnd = 0;
    let timerRaf = null;

    let audioContext = null;
    let alarmInterval = null;

    stopwatchProgress.style.strokeDasharray = CIRCUMFERENCE;
    timerProgress.style.strokeDasharray = CIRCUMFERENCE;

    function setProgress(circle, ratio) {
      const safeRatio = Math.max(0, Math.min(1, ratio));
      circle.style.strokeDashoffset = CIRCUMFERENCE * (1 - safeRatio);
    }

    function formatStopwatch(ms) {
      const totalCs = Math.floor(ms / 10);
      const cs = totalCs % 100;
      const totalSec = Math.floor(totalCs / 100);
      const sec = totalSec % 60;
      const min = Math.floor(totalSec / 60);
      return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}.${String(cs).padStart(2, "0")}`;
    }

    function formatTimer(ms) {
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const hours = Math.floor(totalSec / 3600);
      const min = Math.floor((totalSec % 3600) / 60);
      const sec = totalSec % 60;
      if (hours > 0) {
        return `${String(hours).padStart(2, "0")}:${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }
      return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2100);
    }

    function setStatus(message) {
      statusPill.textContent = message;
    }

    function switchMode(mode) {
      currentMode = mode;
      const isStopwatch = mode === "stopwatch";

      stopwatchTab.classList.toggle("active", isStopwatch);
      timerTab.classList.toggle("active", !isStopwatch);
      stopwatchTab.setAttribute("aria-selected", String(isStopwatch));
      timerTab.setAttribute("aria-selected", String(!isStopwatch));

      stopwatchPanel.classList.toggle("active", isStopwatch);
      timerPanel.classList.toggle("active", !isStopwatch);

      if (isStopwatch) {
        setStatus(swRunning ? "스톱워치 실행 중" : "스톱워치 대기 중");
      } else {
        setStatus(timerRunning ? "타이머 실행 중" : "타이머 대기 중");
      }
    }

    function updateStopwatch() {
      if (!swRunning) return;
      const now = performance.now();
      const elapsed = swElapsed + (now - swStart);
      stopwatchDisplay.textContent = formatStopwatch(elapsed);

      const secondsInMinute = (elapsed % 60000) / 60000;
      setProgress(stopwatchProgress, secondsInMinute);
      stopwatchSub.textContent = `현재 경과 ${formatStopwatch(elapsed)}`;

      swRaf = requestAnimationFrame(updateStopwatch);
    }

    function startStopwatch() {
      swRunning = true;
      swStart = performance.now();
      swStartPause.textContent = "일시정지";
      swLap.disabled = false;
      setStatus("스톱워치 실행 중");
      updateStopwatch();
    }

    function pauseStopwatch() {
      swRunning = false;
      swElapsed += performance.now() - swStart;
      cancelAnimationFrame(swRaf);
      swStartPause.textContent = "계속";
      setStatus("스톱워치 일시정지");
    }

    function resetStopwatch() {
      swRunning = false;
      cancelAnimationFrame(swRaf);
      swStart = 0;
      swElapsed = 0;
      stopwatchDisplay.textContent = "00:00.00";
      stopwatchSub.textContent = "랩 기록은 자동 저장됩니다";
      swStartPause.textContent = "시작";
      swLap.disabled = true;
      setProgress(stopwatchProgress, 0);
      setStatus("스톱워치 초기화");
    }

    function getCurrentStopwatchMs() {
      return swRunning ? swElapsed + (performance.now() - swStart) : swElapsed;
    }

    function saveLaps() {
      localStorage.setItem("premiumStopwatchLaps", JSON.stringify(laps));
    }

    function addLap() {
      const nowMs = getCurrentStopwatchMs();
      const prevMs = laps.length ? laps[0].rawTotal : 0;
      const lap = {
        total: formatStopwatch(nowMs),
        split: formatStopwatch(nowMs - prevMs),
        rawTotal: nowMs,
        createdAt: new Date().toLocaleString("ko-KR")
      };
      laps.unshift(lap);
      saveLaps();
      renderLaps();
      showToast("랩 기록이 저장되었습니다");
    }

    function renderLaps() {
      lapList.innerHTML = "";
      if (!laps.length) {
        lapList.innerHTML = `<div class="empty">아직 저장된 랩 기록이 없습니다.<br>스톱워치를 시작한 뒤 ‘랩 기록’을 눌러보세요.</div>`;
        return;
      }

      laps.forEach((lap, index) => {
        const row = document.createElement("div");
        row.className = "lap";
        row.innerHTML = `
          <span>#${String(laps.length - index).padStart(2, "0")}</span>
          <strong>${lap.total}</strong>
          <small>구간 ${lap.split}</small>
        `;
        row.title = lap.createdAt || "";
        lapList.appendChild(row);
      });
    }

    function updateTimer() {
      if (!timerRunning) return;
      timerRemaining = timerEnd - performance.now();

      if (timerRemaining <= 0) {
        finishTimer();
        return;
      }

      timerDisplay.textContent = formatTimer(timerRemaining);
      const elapsedRatio = 1 - (timerRemaining / timerDuration);
      setProgress(timerProgress, elapsedRatio);
      timerSub.textContent = `남은 시간 ${formatTimer(timerRemaining)}`;
      timerRaf = requestAnimationFrame(updateTimer);
    }

    function startTimer() {
      if (timerRemaining <= 0) timerRemaining = timerDuration;
      unlockAudio();

      timerRunning = true;
      timerEnd = performance.now() + timerRemaining;
      timerStartPause.textContent = "일시정지";
      setStatus("타이머 실행 중");
      updateTimer();
    }

    function pauseTimer() {
      timerRunning = false;
      timerRemaining = Math.max(0, timerEnd - performance.now());
      cancelAnimationFrame(timerRaf);
      timerStartPause.textContent = "계속";
      setStatus("타이머 일시정지");
    }

    function resetTimer() {
      timerRunning = false;
      cancelAnimationFrame(timerRaf);
      stopAlarm();
      timerRemaining = timerDuration;
      timerDisplay.textContent = formatTimer(timerRemaining);
      timerSub.textContent = "프리셋 또는 커스텀 시간을 선택하세요";
      timerStartPause.textContent = "시작";
      setProgress(timerProgress, 0);
      setStatus("타이머 초기화");
    }

    function finishTimer() {
      timerRunning = false;
      cancelAnimationFrame(timerRaf);
      timerRemaining = 0;
      timerDisplay.textContent = "00:00";
      timerSub.textContent = "타이머가 완료되었습니다";
      timerStartPause.textContent = "시작";
      setProgress(timerProgress, 1);
      setStatus("타이머 완료");
      showToast("타이머가 완료되었습니다");
      playAlarm();
    }

    function setTimerDuration(seconds) {
      timerDuration = seconds * 1000;
      timerRemaining = timerDuration;
      timerDisplay.textContent = formatTimer(timerRemaining);
      timerSub.textContent = "선택한 시간으로 설정되었습니다";
      setProgress(timerProgress, 0);
      timerStartPause.textContent = "시작";
      timerRunning = false;
      cancelAnimationFrame(timerRaf);
      stopAlarm();
      setStatus("타이머 설정 완료");
    }

    function unlockAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function beep(frequency = 880, duration = 0.16) {
      unlockAudio();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.22, audioContext.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration + 0.03);
    }

    function playAlarm() {
      stopAlarm();
      let count = 0;
      const pattern = () => {
        beep(count % 2 === 0 ? 988 : 740, 0.18);
        count += 1;
        if (count >= 12) stopAlarm();
      };
      pattern();
      alarmInterval = setInterval(pattern, 420);
    }

    function stopAlarm() {
      if (alarmInterval) {
        clearInterval(alarmInterval);
        alarmInterval = null;
      }
    }

    stopwatchTab.addEventListener("click", () => switchMode("stopwatch"));
    timerTab.addEventListener("click", () => switchMode("timer"));

    swStartPause.addEventListener("click", () => {
      swRunning ? pauseStopwatch() : startStopwatch();
    });

    swLap.addEventListener("click", addLap);
    swReset.addEventListener("click", resetStopwatch);

    clearLaps.addEventListener("click", () => {
      laps = [];
      saveLaps();
      renderLaps();
      showToast("랩 기록을 모두 삭제했습니다");
    });

    timerStartPause.addEventListener("click", () => {
      timerRunning ? pauseTimer() : startTimer();
    });

    timerReset.addEventListener("click", resetTimer);
    timerStopSound.addEventListener("click", () => {
      stopAlarm();
      showToast("알림음을 중지했습니다");
    });

    $$("#presetGrid .preset").forEach((button) => {
      button.addEventListener("click", () => {
        $$("#presetGrid .preset").forEach((el) => el.classList.remove("active"));
        button.classList.add("active");
        const seconds = Number(button.dataset.seconds);
        customMin.value = Math.floor(seconds / 60);
        customSec.value = seconds % 60;
        setTimerDuration(seconds);
      });
    });

    applyCustom.addEventListener("click", () => {
      const min = Math.max(0, Number(customMin.value || 0));
      const sec = Math.min(59, Math.max(0, Number(customSec.value || 0)));
      const total = min * 60 + sec;

      if (total <= 0) {
        showToast("1초 이상으로 설정해 주세요");
        return;
      }

      $$("#presetGrid .preset").forEach((el) => el.classList.remove("active"));
      customMin.value = min;
      customSec.value = sec;
      setTimerDuration(total);
      showToast("커스텀 시간이 적용되었습니다");
    });

    document.addEventListener("keydown", (event) => {
      if (event.target.matches("input")) return;

      if (event.code === "Space") {
        event.preventDefault();
        if (currentMode === "stopwatch") {
          swRunning ? pauseStopwatch() : startStopwatch();
        } else {
          timerRunning ? pauseTimer() : startTimer();
        }
      }

      if (event.key.toLowerCase() === "l" && currentMode === "stopwatch" && swRunning) {
        addLap();
      }

      if (event.key.toLowerCase() === "r") {
        currentMode === "stopwatch" ? resetStopwatch() : resetTimer();
      }
    });

    renderLaps();
    setTimerDuration(1500);
    switchMode("stopwatch");
  </script>
</body>
</html>
